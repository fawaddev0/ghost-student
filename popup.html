<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: monospace;
      background: #0f0f0f;
      color: #eee;
    }

    h2 { margin: 0 0 12px; font-size: 16px; color: #7fff6e; }

    #status {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
    }

    #status.active { color: #7fff6e; }

    #transcript {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      height: 80px;
      overflow-y: auto;
      color: #aaa;
      margin-bottom: 12px;
    }

    .buttons { display: flex; gap: 8px; }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }

    #btnStart { background: #7fff6e; color: #000; font-weight: bold; }
    #btnStop  { background: #1a1a1a; color: #ff4f4f; border: 1px solid #ff4f4f; }

    #btnStop:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>👻 GhostStudent</h2>
  <div id="status">IDLE — ready to record</div>
  <div id="transcript">Transcript will appear here...</div>
  <div class="buttons">
    <button id="btnStart">▶ Start</button>
    <button id="btnStop" disabled>■ Stop</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
